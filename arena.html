<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Arena | Battle Zone</title>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;700;900&display=swap');

        :root {
            --neon-blue: #00d2ff;
            --neon-green: #22c55e;
            --bg-deep: #020617;
            --card-bg: rgba(15, 23, 42, 0.8);
            --border: rgba(255, 255, 255, 0.08);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Outfit', sans-serif; -webkit-tap-highlight-color: transparent; }

        body {
            background-color: var(--bg-deep);
            color: white;
            min-height: 100vh;
            padding-bottom: 100px;
            overflow-x: hidden;
        }

        /* --- HEADER --- */
        header {
            padding: 25px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: linear-gradient(to bottom, rgba(0, 210, 255, 0.1), transparent);
        }

        .back-btn { background: var(--card-bg); border: 1px solid var(--border); color: white; padding: 10px; border-radius: 12px; cursor: pointer; }
        .page-title { font-size: 1.5rem; font-weight: 900; letter-spacing: -1px; }
        .balance-tag { background: rgba(34, 197, 94, 0.1); color: var(--neon-green); padding: 5px 12px; border-radius: 100px; font-size: 12px; font-weight: 800; border: 1px solid rgba(34, 197, 94, 0.2); }

        /* --- FILTERS --- */
        .filters { display: flex; gap: 10px; padding: 0 20px 20px; overflow-x: auto; scrollbar-width: none; }
        .filters::-webkit-scrollbar { display: none; }
        .chip { background: var(--card-bg); border: 1px solid var(--border); padding: 8px 18px; border-radius: 100px; font-size: 11px; font-weight: 700; white-space: nowrap; transition: 0.3s; }
        .chip.active { background: var(--neon-blue); color: #000; border-color: var(--neon-blue); }

        /* --- MATCH CARDS --- */
        .match-container { padding: 0 20px; }
        
        .match-card {
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 28px;
            overflow: hidden;
            margin-bottom: 20px;
            transition: 0.3s;
        }

        .match-banner {
            height: 120px;
            background-size: cover;
            background-position: center;
            position: relative;
            display: flex;
            align-items: flex-end;
            padding: 15px;
        }

        .match-banner::after { content: ''; position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: linear-gradient(to top, var(--bg-deep), transparent); }
        .match-type { position: relative; z-index: 2; background: rgba(0, 0, 0, 0.7); padding: 4px 10px; border-radius: 6px; font-size: 9px; font-weight: 800; border: 1px solid var(--neon-blue); }

        .match-info { padding: 20px; }
        .match-title { font-size: 1.2rem; font-weight: 900; margin-bottom: 12px; }

        .match-stats { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin-bottom: 15px; }
        .stat-box { background: rgba(255,255,255,0.03); padding: 8px; border-radius: 12px; text-align: center; }
        .stat-box p { font-size: 8px; opacity: 0.5; text-transform: uppercase; }
        .stat-box h4 { font-size: 0.9rem; font-weight: 800; color: var(--neon-blue); }

        .slot-wrap { margin-bottom: 15px; }
        .slot-bar { height: 6px; background: rgba(255,255,255,0.1); border-radius: 10px; overflow: hidden; margin-top: 6px; }
        .slot-fill { height: 100%; background: var(--neon-blue); box-shadow: 0 0 8px var(--neon-blue); transition: 1s ease; }
        .slot-text { display: flex; justify-content: space-between; font-size: 10px; font-weight: 700; opacity: 0.7; }

        .btn-battle {
            width: 100%; background: #fff; color: #000; padding: 14px; border-radius: 16px; 
            font-weight: 900; border: none; font-size: 13px; cursor: pointer; display: flex; justify-content: center; align-items: center; gap: 8px; transition: 0.3s;
        }
        .btn-battle:disabled { background: #1e293b; color: #64748b; cursor: not-allowed; }

        /* --- NAV --- */
        nav { position: fixed; bottom: 15px; left: 50%; transform: translateX(-50%); width: 85%; background: rgba(15, 23, 42, 0.95); backdrop-filter: blur(20px); border: 1px solid var(--border); padding: 12px 0; border-radius: 100px; display: flex; justify-content: space-around; z-index: 1000; }
        .nav-link { color: #475569; text-decoration: none; }
        .nav-link.active { color: var(--neon-blue); }

    </style>
</head>
<body>

    <header>
        <div class="back-btn" onclick="location.href='index.html'"><i data-lucide="chevron-left"></i></div>
        <h1 class="page-title">ARENA</h1>
        <div class="balance-tag">₹<span id="headerBalance">4,500</span></div>
    </header>

    <div class="filters">
        <div class="chip active">All</div>
        <div class="chip">Solo</div>
        <div class="chip">Squad</div>
        <div class="chip">TDM</div>
    </div>

    <div class="match-container" id="matchContainer">
        <div class="match-card" id="match-1">
            <div class="match-banner" style="background-image: url('https://images.unsplash.com/photo-1542751371-adc38448a05e?q=80&w=600');">
                <span class="match-type">ERANGEL • SQUAD</span>
            </div>
            <div class="match-info">
                <h2 class="match-title">Weekend Pro Scrims</h2>
                <div class="match-stats">
                    <div class="stat-box"><p>Win</p><h4>₹2,000</h4></div>
                    <div class="stat-box"><p>Kill</p><h4>₹20</h4></div>
                    <div class="stat-box"><p>Entry</p><h4>₹50</h4></div>
                </div>
                <div class="slot-wrap">
                    <div class="slot-text"><span>Slots</span><span>74/100</span></div>
                    <div class="slot-bar"><div class="slot-fill" style="width: 74%;"></div></div>
                </div>
                <button class="btn-battle" onclick="joinMatch(1, 50)">JOIN NOW</button>
            </div>
        </div>

        <div class="match-card" id="match-2">
            <div class="match-banner" style="background-image: url('https://images.unsplash.com/photo-1511512578047-dfb367046420?q=80&w=600');">
                <span class="match-type">MIRAMAR • SOLO</span>
            </div>
            <div class="match-info">
                <h2 class="match-title">Lone Survivor Cup</h2>
                <div class="match-stats">
                    <div class="stat-box"><p>Win</p><h4>₹1,200</h4></div>
                    <div class="stat-box"><p>Kill</p><h4>₹15</h4></div>
                    <div class="stat-box"><p>Entry</p><h4>₹30</h4></div>
                </div>
                <div class="slot-wrap">
                    <div class="slot-text"><span>Slots</span><span>42/100</span></div>
                    <div class="slot-bar"><div class="slot-fill" style="width: 42%;"></div></div>
                </div>
                <button class="btn-battle" onclick="joinMatch(2, 30)">JOIN NOW</button>
            </div>
        </div>
    </div>

    <nav>
        <a href="home.html" class="nav-link"><i data-lucide="layout-grid"></i></a>
        <a href="arena.html" class="nav-link active"><i data-lucide="swords"></i></a>
        <a href="wallet.html" class="nav-link"><i data-lucide="wallet"></i></a>
        <a href="profile.html" class="nav-link"><i data-lucide="user"></i></a>
    </nav>

    <script>
        lucide.createIcons();

        // --- LOCAL STORAGE LOGIC ---
        let balance = localStorage.getItem('walletBalance') || 4500;
        let joinedMatches = JSON.parse(localStorage.getItem('joinedMatches')) || [];

        function updateUI() {
            document.getElementById('headerBalance').innerText = balance;
            localStorage.setItem('walletBalance', balance);
            
            joinedMatches.forEach(id => {
                const btn = document.querySelector(`#match-${id} .btn-battle`);
                if(btn) {
                    btn.innerText = "JOINED ✓";
                    btn.disabled = true;
                    btn.style.background = "#22c55e";
                    btn.style.color = "#fff";
                }
            });
        }

        function joinMatch(id, entryFee) {
            if (balance >= entryFee) {
                if(confirm(`Join this match for ₹${entryFee}?`)) {
                    balance -= entryFee;
                    joinedMatches.push(id);
                    localStorage.setItem('joinedMatches', JSON.stringify(joinedMatches));
                    updateUI();
                    alert("Successfully Joined!");
                }
            } else {
                alert("Insufficient Balance! Please Top Up.");
                location.href = 'wallet.html';
            }
        }

        window.onload = updateUI;
    </script>
</body>
</html>

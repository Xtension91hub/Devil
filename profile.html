<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Profile | Arena OS</title>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;700;900&display=swap');

        :root {
            --neon-blue: #00d2ff;
            --bg-deep: #020617;
            --card-bg: rgba(15, 23, 42, 0.8);
            --border: rgba(255, 255, 255, 0.08);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Outfit', sans-serif; -webkit-tap-highlight-color: transparent; }

        body {
            background-color: var(--bg-deep);
            color: white;
            min-height: 100vh;
            padding-bottom: 100px;
        }

        /* --- PROFILE HEADER --- */
        .profile-header {
            background: linear-gradient(to bottom, rgba(0, 210, 255, 0.2), var(--bg-deep));
            padding: 50px 20px 30px;
            text-align: center;
            border-bottom: 1px solid var(--border);
        }

        .avatar-container {
            position: relative;
            width: 120px;
            height: 120px;
            margin: 0 auto 15px;
        }

        .profile-dp {
            width: 100%;
            height: 100%;
            border-radius: 35px;
            border: 4px solid var(--neon-blue);
            background: #000;
            box-shadow: 0 0 20px rgba(0, 210, 255, 0.3);
        }

        .rank-badge {
            position: absolute;
            bottom: -5px;
            right: -5px;
            background: var(--neon-blue);
            color: #000;
            padding: 4px 10px;
            border-radius: 10px;
            font-size: 10px;
            font-weight: 900;
        }

        .user-name { font-size: 1.8rem; font-weight: 900; letter-spacing: -1px; }
        .user-id { font-size: 11px; opacity: 0.5; letter-spacing: 1px; margin-top: 5px; }

        /* --- STATS BAR --- */
        .stats-bar {
            display: flex;
            justify-content: space-around;
            background: var(--card-bg);
            width: 90%;
            margin: -25px auto 25px;
            padding: 20px;
            border-radius: 25px;
            border: 1px solid var(--border);
            backdrop-filter: blur(10px);
        }

        .stat-item { text-align: center; }
        .stat-item h3 { font-size: 1.2rem; font-weight: 900; color: var(--neon-blue); }
        .stat-item p { font-size: 9px; opacity: 0.5; text-transform: uppercase; }

        /* --- MENU LIST --- */
        .menu-container { width: 90%; margin: 0 auto; display: flex; flex-direction: column; gap: 10px; }

        .menu-item {
            background: var(--card-bg);
            padding: 18px;
            border-radius: 20px;
            border: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: space-between;
            text-decoration: none;
            color: white;
            transition: 0.3s;
        }

        .menu-item:active { transform: scale(0.97); background: rgba(255,255,255,0.05); }

        .menu-info { display: flex; align-items: center; gap: 15px; }
        .menu-icon { color: var(--neon-blue); }
        .menu-text { font-weight: 700; font-size: 15px; }

        /* --- LOGOUT --- */
        .logout-btn {
            margin-top: 20px;
            color: #ff4b4b;
            border-color: rgba(255, 75, 75, 0.2);
        }

        /* --- NAV --- */
        nav { position: fixed; bottom: 15px; left: 50%; transform: translateX(-50%); width: 85%; background: rgba(15, 23, 42, 0.95); backdrop-filter: blur(20px); border: 1px solid var(--border); padding: 12px 0; border-radius: 100px; display: flex; justify-content: space-around; z-index: 1000; }
        .nav-link { color: #475569; text-decoration: none; }
        .nav-link.active { color: var(--neon-blue); }

    </style>
</head>
<body>

    <div class="profile-header">
        <div class="avatar-container">
            <img src="https://api.dicebear.com/7.x/bottts-neutral/svg?seed=Mustafa" class="profile-dp" id="userDp">
            <div class="rank-badge">DIAMOND IV</div>
        </div>
        <h1 class="user-name" id="displayPlayerName">Mustafa_Ak</h1>
        <p class="user-id">ID: 5540928817</p>
    </div>

    <div class="stats-bar">
        <div class="stat-item"><h3>152</h3><p>Matches</p></div>
        <div class="stat-item"><h3>48</h3><p>Wins</p></div>
        <div class="stat-item"><h3>1.8k</h3><p>Kills</p></div>
    </div>

    <div class="menu-container">
        <a href="settings.html" class="menu-item">
            <div class="menu-info">
                <i data-lucide="settings" class="menu-icon"></i>
                <span class="menu-text">Account Settings</span>
            </div>
            <i data-lucide="chevron-right" size="18" style="opacity: 0.3;"></i>
        </a>

        <a href="withdrawal.html" class="menu-item">
            <div class="menu-info">
                <i data-lucide="external-link" class="menu-icon"></i>
                <span class="menu-text">Withdraw Funds</span>
            </div>
            <i data-lucide="chevron-right" size="18" style="opacity: 0.3;"></i>
        </a>

        <a href="#" class="menu-item">
            <div class="menu-info">
                <i data-lucide="help-circle" class="menu-icon"></i>
                <span class="menu-text">Help & Support</span>
            </div>
            <i data-lucide="chevron-right" size="18" style="opacity: 0.3;"></i>
        </a>

        <a href="#" class="menu-item logout-btn" onclick="alert('Logging out...')">
            <div class="menu-info">
                <i data-lucide="log-out" style="color: #ff4b4b;"></i>
                <span class="menu-text" style="color: #ff4b4b;">Logout</span>
            </div>
        </a>
    </div>

    <nav>
        <a href="home.html" class="nav-link"><i data-lucide="layout-grid"></i></a>
        <a href="arena.html" class="nav-link"><i data-lucide="swords"></i></a>
        <a href="wallet.html" class="nav-link"><i data-lucide="wallet"></i></a>
        <a href="profile.html" class="nav-link active"><i data-lucide="user"></i></a>
    </nav>

    <script>
        lucide.createIcons();

        // Load Personalization
        window.onload = () => {
            const savedName = localStorage.getItem('playerName');
            if (savedName) {
                document.getElementById('displayPlayerName').innerText = savedName;
                // Update DP seed if name changes for a new cool bot avatar
                document.getElementById('userDp').src = `https://api.dicebear.com/7.x/bottts-neutral/svg?seed=${savedName}`;
            }
        };
    </script>
</body>
</html>
